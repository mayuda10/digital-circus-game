<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Digital Circus ULTIMATE</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

/* MENU */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #ff00ff, black);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    animation: bg 3s infinite alternate;
}

@keyframes bg {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(180deg); }
}

button {
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
}

canvas {
    display: block;
    margin: auto;
    border: 3px solid white;
}

/* UI */
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🤡 DIGITAL CIRCUS</h1>
    <button onclick="startGame()">JOGAR</button>
</div>

<div id="ui" style="display:none">
    Score: <span id="score">0</span><br>
    Recorde: <span id="record">0</span><br>
    Vida:
    <div style="width:200px;height:20px;border:1px solid white;">
        <div id="lifeBar" style="height:100%;background:red;"></div>
    </div>
    <button onclick="restart()">Reiniciar</button>
</div>

<canvas id="c" width="600" height="400"></canvas>

<audio id="music" loop>
https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// ========================
// VARIÁVEIS
// ========================

let player, enemies, particles, boss;
let score, record, life;
let gameRunning = false;
let paused = false;
let chaos = 0;

// ========================
// INICIALIZAR
// ========================

function init(){
    player = {
        x: 300,
        y: 200,
        size: 25,
        dash: 0
    };

    enemies = [];
    particles = [];
    boss = null;

    score = 0;
    life = 100;
    chaos = 0;

    record = localStorage.getItem("record") || 0;
    document.getElementById("record").innerText = record;
}

// ========================
// CONTROLES
// ========================

let keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;
    if(e.key === "p") paused = !paused;
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

// MOBILE
c.addEventListener("touchmove", e=>{
    let t = e.touches[0];
    player.x = t.clientX - 20;
    player.y = t.clientY - 20;
});

// CLIQUE = EFEITO
c.addEventListener("click", ()=>{
    explode(player.x, player.y);
});

// ========================
// FUNÇÕES DO JOGO
// ========================

function startGame(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("music").play();
    init();
    gameRunning = true;
}

function restart(){
    init();
    gameRunning = true;
}

// ========================
// INIMIGOS
// ========================

function spawn(){
    enemies.push({
        x: Math.random()*600,
        y: -20,
        size: 20 + Math.random()*25,
        speed: 2 + Math.random()*3,
        color: `hsl(${Math.random()*360},100%,60%)`
    });
}

setInterval(spawn, 500);

// ========================
// BOSS
// ========================

function spawnBoss(){
    boss = {
        x: 250,
        y: 60,
        size: 70,
        life: 100
    };
}

// ========================
// PARTÍCULAS
// ========================

function explode(x,y){
    for(let i=0;i<15;i++){
        particles.push({
            x: x,
            y: y,
            dx: (Math.random()-0.5)*6,
            dy: (Math.random()-0.5)*6,
            life: 40
        });
    }
}

// ========================
// COLISÃO
// ========================

function collide(a,b){
    return a.x < b.x + b.size &&
           a.x + a.size > b.x &&
           a.y < b.y + b.size &&
           a.y + a.size > b.y;
}

// ========================
// UPDATE
// ========================

function update(){
    if(!gameRunning || paused) return;

    // movimento
    if(keys["ArrowUp"]) player.y -= 4;
    if(keys["ArrowDown"]) player.y += 4;
    if(keys["ArrowLeft"]) player.x -= 4;
    if(keys["ArrowRight"]) player.x += 4;

    // dash
    if(keys[" "] && player.dash <= 0){
        player.dash = 10;
    }

    if(player.dash > 0){
        player.dash--;
        player.x += (keys["ArrowRight"]-keys["ArrowLeft"])*7;
        player.y += (keys["ArrowDown"]-keys["ArrowUp"])*7;
    }

    // modo caos
    if(keys["Shift"] && chaos <= 0){
        chaos = 200;
    }

    if(chaos > 0) chaos--;

    // limite tela
    player.x = Math.max(0, Math.min(575, player.x));
    player.y = Math.max(0, Math.min(375, player.y));

    // inimigos
    for(let i=0;i<enemies.length;i++){
        let e = enemies[i];
        e.y += e.speed;

        if(collide(player,e)){
            life -= chaos>0 ? 2 : 10;
            explode(e.x,e.y);
            enemies.splice(i,1);
            i--;
        }

        if(e.y > 400){
            enemies.splice(i,1);
            score++;
            i--;
        }
    }

    // boss
    if(score > 20 && !boss){
        spawnBoss();
    }

    if(boss){
        boss.x += Math.sin(Date.now()/200)*3;

        if(collide(player,boss)){
            life -= 1;
        }
    }

    // partículas
    for(let i=0;i<particles.length;i++){
        let p = particles[i];
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        if(p.life <= 0){
            particles.splice(i,1);
            i--;
        }
    }

    // UI
    document.getElementById("score").innerText = score;
    document.getElementById("lifeBar").style.width = life+"%";

    if(score > record){
        record = score;
        localStorage.setItem("record", record);
    }
}

// ========================
// DESENHO
// ========================

function draw(){
    ctx.clearRect(0,0,600,400);

    // fundo animado
    ctx.fillStyle = `hsl(${Date.now()/10},50%,10%)`;
    ctx.fillRect(0,0,600,400);

    if(!gameRunning) return;

    // player
    ctx.fillStyle = "red";
    ctx.fillRect(player.x,player.y,25,25);

    // olhos
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(player.x+8,player.y+10,5,0,Math.PI*2);
    ctx.arc(player.x+17,player.y+10,5,0,Math.PI*2);
    ctx.fill();

    // inimigos
    for(let e of enemies){
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x,e.y,e.size,e.size);
    }

    // boss
    if(boss){
        ctx.fillStyle = "purple";
        ctx.fillRect(boss.x,boss.y,boss.size,boss.size);
        ctx.fillStyle = "white";
        ctx.fillText("BOSS", boss.x+10, boss.y-5);
    }

    // partículas
    ctx.fillStyle="yellow";
    for(let p of particles){
        ctx.fillRect(p.x,p.y,3,3);
    }

    // pause
    if(paused){
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("PAUSADO",220,200);
    }

    // game over
    if(life <= 0){
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("FIM DO SHOW 🤡",160,180);

        ctx.font="20px Arial";
        ctx.fillText("Clique em Reiniciar 👇",170,220);

        gameRunning = false;
    }
}

// ========================
// LOOP
// ========================

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
