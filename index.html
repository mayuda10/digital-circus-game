<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Digital Circus EXTREME</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

canvas {
    display: block;
    margin: auto;
    border: 3px solid #fff;
}

/* MENU */
#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: radial-gradient(circle, #ff00ff, #000);
}

button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🤡 DIGITAL CIRCUS</h1>
    <button onclick="startGame()">JOGAR</button>
</div>

<div id="ui" style="display:none">
    Score: <span id="score">0</span><br>
    Recorde: <span id="record">0</span><br>
    <div style="width:200px;height:20px;border:1px solid white;">
        <div id="lifeBar" style="height:100%;width:100%;background:red;"></div>
    </div>
</div>

<canvas id="c" width="600" height="400"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let player, enemies, score, record, life, boss;
let gameRunning = false;
let paused = false;
let chaos = 0;

function init(){
    player = {x:300,y:200,size:25,dash:0};
    enemies=[];
    score=0;
    life=100;
    boss=null;
    chaos=0;

    record = localStorage.getItem("record") || 0;
    document.getElementById("record").innerText = record;
}

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("ui").style.display="block";
    init();
    gameRunning=true;
}

let keys={};
document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(e.key==="p") paused=!paused;
});
document.addEventListener("keyup", e=>keys[e.key]=false);

function spawn(){
    enemies.push({
        x:Math.random()*600,
        y:-20,
        size:20+Math.random()*20,
        speed:2+Math.random()*3,
        color:`hsl(${Math.random()*360},100%,60%)`
    });
}

function spawnBoss(){
    boss = {x:250,y:50,size:70,life:100};
}

// partículas
let particles=[];
function explode(x,y){
    for(let i=0;i<10;i++){
        particles.push({
            x,y,
            dx:(Math.random()-0.5)*6,
            dy:(Math.random()-0.5)*6,
            life:30
        });
    }
}

function update(){
    if(!gameRunning || paused) return;

    if(keys["ArrowUp"]) player.y-=4;
    if(keys["ArrowDown"]) player.y+=4;
    if(keys["ArrowLeft"]) player.x-=4;
    if(keys["ArrowRight"]) player.x+=4;

    // DASH
    if(keys[" "] && player.dash<=0){
        player.dash=10;
    }

    if(player.dash>0){
        player.dash--;
        player.x += (keys["ArrowRight"]-keys["ArrowLeft"])*7;
        player.y += (keys["ArrowDown"]-keys["ArrowUp"])*7;
    }

    // MODO CAOS
    if(keys["Shift"] && chaos<=0){
        chaos=200;
    }

    if(chaos>0){
        chaos--;
    }

    // limites
    player.x=Math.max(0,Math.min(575,player.x));
    player.y=Math.max(0,Math.min(375,player.y));

    for(let i=0;i<enemies.length;i++){
        let e=enemies[i];
        e.y+=e.speed;

        if(collide(player,e)){
            life-= chaos>0 ? 2 : 10;
            explode(e.x,e.y);
            enemies.splice(i,1);
            i--;
        }

        if(e.y>400){
            enemies.splice(i,1);
            score++;
            i--;
        }
    }

    if(score>15 && !boss){
        spawnBoss();
    }

    if(boss){
        boss.x += Math.sin(Date.now()/200)*3;

        if(collide(player,boss)){
            life-=1;
        }
    }

    // partículas
    for(let i=0;i<particles.length;i++){
        let p=particles[i];
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
        if(p.life<=0){
            particles.splice(i,1);
            i--;
        }
    }

    document.getElementById("score").innerText=score;
    document.getElementById("lifeBar").style.width=life+"%";

    if(score>record){
        record=score;
        localStorage.setItem("record",record);
    }
}

function collide(a,b){
    return a.x < b.x+b.size &&
           a.x+25 > b.x &&
           a.y < b.y+b.size &&
           a.y+25 > b.y;
}

function draw(){
    ctx.clearRect(0,0,600,400);

    // fundo animado
    ctx.fillStyle = `hsl(${Date.now()/10},50%,10%)`;
    ctx.fillRect(0,0,600,400);

    if(!gameRunning) return;

    // player
    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,25,25);

    // olhos
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(player.x+8,player.y+10,5,0,Math.PI*2);
    ctx.arc(player.x+17,player.y+10,5,0,Math.PI*2);
    ctx.fill();

    // inimigos
    for(let e of enemies){
        ctx.fillStyle=e.color;
        ctx.fillRect(e.x,e.y,e.size,e.size);
    }

    // boss
    if(boss){
        ctx.fillStyle="purple";
        ctx.fillRect(boss.x,boss.y,boss.size,boss.size);
        ctx.fillStyle="white";
        ctx.fillText("BOSS",boss.x+10,boss.y-5);
    }

    // partículas
    ctx.fillStyle="yellow";
    for(let p of particles){
        ctx.fillRect(p.x,p.y,3,3);
    }

    // pause
    if(paused){
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("PAUSADO",220,200);
    }

    // game over
    if(life<=0){
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("FIM DO SHOW 🤡",170,200);
        gameRunning=false;
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

setInterval(spawn,500);
loop();
</script>

</body>
</html>
